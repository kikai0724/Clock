<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Clock Settings</title>
  <style>
    html,body{height:100%;margin:0;font-family:Inter,Segoe UI,Helvetica,Arial,sans-serif;background:radial-gradient(circle at top left, rgba(126,231,255,0.18), transparent 28%), radial-gradient(circle at bottom right, rgba(155,123,255,0.14), transparent 30%), #090e1a;color:#e6eef8;overflow:hidden}
    body{display:flex;align-items:center;justify-content:center;transition:background 300ms ease;padding:20px}
    body::before{content:'';position:fixed;inset:0;background:rgba(8,12,22,0.45);backdrop-filter:blur(12px);pointer-events:none;}
    .panel{width:100%;max-width:340px;max-height:calc(100vh - 40px);overflow-y:auto;padding:24px;border-radius:22px;background:rgba(7,13,25,0.92);box-shadow:0 30px 80px rgba(0,0,0,0.35);border:1px solid rgba(255,255,255,0.08);opacity:0;transform:translateY(18px) scale(0.96);transition:transform 280ms cubic-bezier(.22,1,.36,1),opacity 280ms ease,box-shadow 280ms ease}
    .panel::-webkit-scrollbar{width:10px}
    .panel::-webkit-scrollbar-track{background:rgba(8,12,22,0.95);border-radius:999px}
    .panel::-webkit-scrollbar-thumb{background:rgba(126,231,255,0.22);border-radius:999px}
    .panel::-webkit-scrollbar-thumb:hover{background:rgba(126,231,255,0.35)}
    .panel{scrollbar-color:rgba(126,231,255,0.22) rgba(8,12,22,0.95);scrollbar-width:thin}
    body.loaded .panel{opacity:1;transform:translateY(0) scale(1)}
    h1{font-size:18px;margin:0 0 18px;color:#ffffff;letter-spacing:.02em;text-transform:uppercase;opacity:.92}
    .row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding:10px 12px;border-radius:14px;transition:background 220ms ease,color 220ms ease}
    .row:hover{background:rgba(255,255,255,0.05)}
    .row label{font-size:13px;color:#cfd8ec}
    .row input[type=checkbox]{width:18px;height:18px;accent:#7ee7ff;cursor:pointer}
    .row select{min-width:132px;padding:10px 12px;border-radius:12px;border:1px solid rgba(255,255,255,0.14);background:rgba(255,255,255,0.06);color:#fff;outline:none;transition:border-color 220ms ease,background 220ms ease}
    .row select:focus{border-color:#7ee7ff;background:rgba(255,255,255,0.12)}
    .buttons{display:flex;gap:10px;justify-content:flex-end;margin-top:22px}
    .btn{border:none;padding:10px 14px;border-radius:12px;font-size:13px;font-weight:600;cursor:pointer;transition:transform 180ms ease,box-shadow 180ms ease,background 180ms ease}
    .btn:hover{transform:translateY(-1px);box-shadow:0 14px 28px rgba(0,0,0,0.2)}
    .btn.primary{background:linear-gradient(90deg,#70e0ff,#a178ff);color:#06111a}
    .btn.secondary{background:rgba(255,255,255,0.08);color:#e6eef8}
    .footer{margin-top:18px;font-size:12px;color:#9fbfdc;text-align:right;opacity:.85}
    .pulse{animation:pulseGlow 2400ms ease-in-out infinite alternate}
    @keyframes pulseGlow{0%{box-shadow:0 0 0 rgba(126,231,255,0)}100%{box-shadow:0 0 18px rgba(126,231,255,0.14)}}
  </style>
</head>
<body>
  <div class="panel pulse">
    <h1>Clock Settings</h1>
    <div class="row">
      <label for="alwaysOnTop">Always on top</label>
      <input id="alwaysOnTop" type="checkbox">
    </div>
    <div class="row">
      <label for="showSeconds">Show seconds</label>
      <input id="showSeconds" type="checkbox">
    </div>
    <div class="row">
      <label for="showDate">Show date</label>
      <input id="showDate" type="checkbox">
    </div>
    <div class="row">
      <label for="showAuthor">Show credit text</label>
      <input id="showAuthor" type="checkbox">
    </div>
    <div class="row">
      <label for="use24Hour">24-hour clock</label>
      <input id="use24Hour" type="checkbox">
    </div>
    <div class="row">
      <label for="clockSize">Clock size</label>
      <select id="clockSize">
        <option value="small">Small</option>
        <option value="normal">Normal</option>
        <option value="large">Large</option>
      </select>
    </div>
    <div class="row">
      <label for="blurIntensity">Blur intensity</label>
      <select id="blurIntensity">
        <option value="low">Low</option>
        <option value="medium">Medium</option>
        <option value="high">High</option>
      </select>
    </div>
    <div class="row">
      <label for="windowOpacity">Opacity</label>
      <select id="windowOpacity">
        <option value="1">100%</option>
        <option value="0.95">95%</option>
        <option value="0.9">90%</option>
        <option value="0.8">80%</option>
      </select>
    </div>
    <div class="row">
      <label for="theme">Theme</label>
      <select id="theme">
        <option value="dark">Dark</option>
        <option value="light">Light</option>
        <option value="blue">Blue</option>
        <option value="neon">Neon</option>
      </select>
    </div>
    <div class="buttons">
      <button id="close" class="btn secondary">Close</button>
      <button id="save" class="btn primary">Save</button>
    </div>
    <div class="footer">Made by kikai_.</div>
  </div>
  <script src="settings.js"></script>
</body>
</html>
