<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Clock</title>
  <style>
    html,body{height:100%;margin:0;font-family:Inter,Segoe UI,Helvetica,Arial,sans-serif;background:transparent;color:var(--text);overflow:hidden}
    :root{--accent:#7ee7ff;--accent-2:#9b7bff;--text:#e6eef8;--card-bg:rgba(255,255,255,0.04);--card-border:rgba(255,255,255,0.06);--card-fade:rgba(255,255,255,0.02);--card-blur:8px;--card-opacity:0.95;--time-size:72px}
    :root[data-theme='light']{--accent:#3b82f6;--accent-2:#60a5fa;--text:#14233a;--card-bg:rgba(255,255,255,0.92);--card-border:rgba(15,23,42,0.12);--card-fade:rgba(255,255,255,0.6)}
    :root[data-theme='blue']{--accent:#38bdf8;--accent-2:#0ea5e9;--text:#eff6ff;--card-bg:rgba(15,23,42,0.88);--card-border:rgba(56,189,248,0.25);--card-fade:rgba(56,189,248,0.08)}
    :root[data-theme='neon']{--accent:#7c3aed;--accent-2:#22c55e;--text:#ecfccb;--card-bg:rgba(8,10,27,0.9);--card-border:rgba(34,197,94,0.22);--card-fade:rgba(124,58,237,0.08)}
    .bg-canvas{position:fixed;inset:0;z-index:0}
    .wrap{height:100%;display:flex;align-items:center;justify-content:center;position:relative;z-index:2}
    .card{background:linear-gradient(135deg,var(--card-bg),var(--card-fade));backdrop-filter: blur(var(--card-blur));opacity:var(--card-opacity);padding:28px;border-radius:14px;box-shadow:0 12px 40px rgba(2,6,23,0.6);text-align:center;min-width:520px;border:1px solid var(--card-border);-webkit-app-region:drag;cursor:grab}
    .btn, .close{-webkit-app-region:no-drag}
    .time{font-size:var(--time-size);font-weight:800;letter-spacing:6px;margin:0;color:var(--accent);text-shadow:0 8px 30px rgba(126,231,255,0.08);transform-origin:center;transition:transform 220ms cubic-bezier(.2,.8,.2,1)}
    .time .digit{display:inline-block;min-width:36px}
    .date{font-size:14px;color:#c9e7ff;margin-top:8px}
    .small{font-size:12px;color:#9fbfdc;margin-top:10px;cursor:pointer;-webkit-app-region:no-drag}
    .small:hover{color:#7ee7ff}
    .controls{display:flex;gap:8px;justify-content:center;margin-top:12px}
    .btn{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);padding:6px 10px;border-radius:8px;color:#dceffd;cursor:pointer;font-size:12px}
    .btn.on{background:linear-gradient(90deg,var(--accent),var(--accent-2));color:#06111a}
    .close{position:absolute;right:12px;top:8px;width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;background:rgba(0,0,0,0.25);backdrop-filter:blur(4px);z-index:3}
    .close:hover{background:rgba(255,80,80,0.12)}
    @keyframes pulse {
      0%{filter:blur(0px)}
      50%{filter:blur(4px)}
      100%{filter:blur(0px)}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div id="time" class="time">00:00:00</div>
      <div id="date" class="date">--</div>
      <div id="author" class="small">Made by kikai_.</div>
    </div>
  </div>
  <script src="renderer.js"></script>
</body>
</html>
